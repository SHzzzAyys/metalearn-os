name: Feature request
description: Suggest a focused product or engineering improvement.
title: "[Feature]: "
labels: ["type:feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What learning workflow or engineering constraint does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Library
        - Review
        - Feynman explanation
        - Compass
        - Insights
        - Settings/privacy
        - AI boundary
        - Storage/export
        - Documentation
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Boundaries
      description: What should this feature explicitly not do?
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How should maintainers know this is complete?
